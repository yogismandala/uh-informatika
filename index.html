            async function compressImage(base64Str, maxWidth = 450, quality = 0.7) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        // Hitung rasio agar gambar tidak penyet
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Ubah kembali ke Base64 dengan format JPEG (lebih ringan dari PNG)
                        const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressedBase64);
                    };
                });
            }
            
            // --- PILIHAN 9: 3D CUBE LOGIC ---
            function showLoading() {

            // Fungsi ini tugasnya cuma satu: Mengembalikan data yang sudah difilter & disortir
            function getProcessedData() {
                // 1. FILTER
                let filtered = allExamResults.filter(item => {
                    const selectedClass = String(filterState.class || "").trim();
                    const itemClass = String(item.student_class || "").trim();
                    const selectedSubject = String(filterState.subject || "").trim();
                    const itemSubject = String(item.exam_subject || "").trim();

                    const matchClass = selectedClass === "" || itemClass === selectedClass;
                    const matchSubject = selectedSubject === "" || itemSubject === selectedSubject;
                    return matchClass && matchSubject;
                });

                // 2. SORTING
                filtered.sort((a, b) => {
                    switch (filterState.sortBy) {
                        case 'score_desc': return Number(b.final_score) - Number(a.final_score);
                        case 'score_asc': return Number(a.final_score) - Number(b.final_score);
                        case 'name_asc': return a.student_name.localeCompare(b.student_name);
                        case 'name_desc': return b.student_name.localeCompare(a.student_name);
                        case 'time_desc': default: return new Date(b.exam_time || 0) - new Date(a.exam_time || 0);
                    }
                });
                return filtered;
            }

            // 3. FUNGSI MEMUAT DATA SOAL DAN HASIL UJIAN
            async function loadExamData(silent = false) {

                    const { data: questionsData, error: questionsError } = await dbClient
                        .from('questions')
                        .select('*')
                        .order('id', { ascending: true });
                    if (questionsError) {
                        console.error("Error load questions:", questionsError);
                        showToast('Gagal memuat soal', 'error');
                        return false;
                    }
                    // Map data soal untuk mengenkripsi jawaban (security_token)
                    allQuestions = (questionsData || []).map(q => {
                        return {
                            ...q,
                            security_token: btoa(q.answer_key || '')

                    // --- BAGIAN YANG DIUBAH: B & C (OPTIMALISASI FILTER DATABASE) ---
                    const userRole = currentUser ? currentUser.role : null;

                    let resultsQuery = dbClient
                        .from('examresult')
                        .select('*')

                    if (userRole === 'siswa' && currentUser) {

                    const { data: resultsData, error: resultsError } = await resultsQuery;

                        return false;
                    }

                    // Simpan langsung ke memori karena datanya sudah disaring dengan tepat oleh Supabase

                    return false;
                } finally {

            // Fungsi Mengaktifkan Supabase Realtime

                // Cegah koneksi ganda jika tombol diklik berkali-kali
                if (realtimeChannel) return; 

                const loadingText = document.getElementById('loadingText');
                realtimeChannel = dbClient
                    .channel('monitoring-ujian')
                    .on(
                        'postgres_changes',
                        {
                            event: '*', // Memantau INSERT (siswa baru login) dan UPDATE (siswa update soal/status)
                            schema: 'public',
                            table: 'monitoring' // Pastikan nama tabel Anda benar 'monitoring'
                        },
                        (payload) => {
                            // Setiap kali ada siswa update di database, blok kode ini langsung berjalan!
                            if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
                                // Langsung lempar data terbaru ke fungsi update baris Anda
                                updateBarisTabel(payload.new);
                                
                                // Update tulisan last update di pojok layar
                                if (loadingText) {
                                    loadingText.innerText = `Update Realtime Aktif 🟢 (Terakhir: ${new Date().toLocaleTimeString()})`;
                                }
                            }
                        }
                    )
                    .subscribe((status) => {
                        if (status === 'SUBSCRIBED') {
                            console.log("✅ Berhasil terhubung ke Supabase Realtime!");
                            if (loadingText) {
                                loadingText.innerText = "Monitoring Realtime Aktif 🟢";

                            }
                        }
                    });

                if (statusText.includes("MENCURIGAKAN")) {

                } else if (statusText === "Selesai") {

                        waktuUpdate = data.last_update;
                    }

                const tampilWaktuLogin = data.waktu_login || "-";
                const tampilWaktuSelesai = data.waktu_selesai || "-";
                
                let nomorUrut = row ? row.querySelector('.row-number').textContent : "1";

                        row.style.backgroundColor = "#fffbeb";

            // 1. FUNGSI MENYIMPAN HASIL UJIAN KE SUPABASE
            async function saveExamResultToSheet(examData, retries = 3) {
                for (let i = 0; i < retries; i++) {
                    try {
                        showLoading();
                        
                        // Siapkan data, hapus property 'action' karena Supabase tidak butuh itu
                        const dataToSave = { ...examData };
                        delete dataToSave.action;

                        // Pastikan format answers menjadi JSON string jika struktur kolom di Supabase diset 'text'
                        // Jika kolom di Supabase diset 'jsonb', ini opsional namun tetap aman dilakukan.
                        if (typeof dataToSave.answers === 'object') {
                            dataToSave.answers = JSON.stringify(dataToSave.answers);
                        }

                        // Proses Insert ke Supabase
                        const { error } = await dbClient
                            .from('examresult')
                            .insert([dataToSave]);

                        if (!error) {
                            return true; // Berhasil terkirim
                        } else {
                            console.error("Gagal simpan ke Supabase (Percobaan " + (i + 1) + "):", error);
                        }
                        
                    } catch (error) {
                        console.error("Error saat mengirim nilai:", error);
                    } finally {
                        hideLoading();
                    }

                    // Tunggu sebentar sebelum mencoba lagi (exponential backoff)
                    if (i < retries - 1) {
                        const waitTime = (i + 1) * 2000; // 2s, 4s...
                        await new Promise(resolve => setTimeout(resolve, waitTime));
                    }
                }                
                return false; // Gagal total setelah semua percobaan
            }

            function getActiveSubjects() {
                // 1. Cek apakah examSettings ada dan memiliki active_subjects
                if (typeof examSettings === 'undefined' || !examSettings.active_subjects || examSettings.active_subjects.length === 0) {
                    // Jika tidak ada pengaturan jadwal, kembalikan semua mapel default (jika variabel SUBJECTS ada)
                    return typeof SUBJECTS !== 'undefined' ? SUBJECTS : []; 
                }
                
                const now = new Date();
                
                // 2. Filter data jadwal
                const validSchedules = examSettings.active_subjects.filter(item => {
                    if (typeof item === 'object' && item !== null) {
                        // Jika tidak ada start/end time, gunakan parameter is_active
                        if (!item.start_time || !item.end_time) return item.is_active; 
                        
                        // Jika ada waktu, cek apakah saat ini berada dalam rentang ujian
                        const startTime = new Date(item.start_time);
                        const endTime = new Date(item.end_time);
                        return now >= startTime && now <= endTime;
                    }
                    // Jika item hanya berupa teks/string biasa
                    return typeof item === 'string';
                });

                // 3. Ambil nama mata pelajarannya saja
                return validSchedules.map(item => {
                    return typeof item === 'object' ? item.subject : item;
                });
            }

            async function handleLogin(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();

                if (!username || !password) {
                    showError('Username dan password wajib diisi!');
                    return;
                }

                if (typeof Swal !== 'undefined') {
                    Swal.fire({
                        title: 'Mencocokkan data...',
                        allowOutsideClick: false,
                        didOpen: () => { Swal.showLoading(); }
                    });
                }
                let user = null;
                try {
                    // --- PROSES LOGIN AMAN DAN SPESIFIK MENGGUNAKAN SUPABASE ---
                    const { data: userData, error } = await dbClient
                        .from('users')
                        .select('*')
                        .eq('username', username)
                        .eq('password', password)
                        .single();

                    if (error || !userData) {
                        if (typeof Swal !== 'undefined') Swal.close();
                        showError('Username atau password salah!');
                        return;
                    }
                    // --- LOGIKA TAMBAHAN: FITUR SINGLE LOGIN (KHUSUS SISWA) ---
                    if (userData.role === 'siswa' && userData.is_login === true) {
                        if (typeof Swal !== 'undefined') {
                            Swal.fire({
                                icon: 'warning',
                                title: 'Akses Ditolak!',
                                text: 'Akun Anda sedang aktif di perangkat lain! Silahkan logout dari perangkat sebelumnya atau hubungi guru.',
                                confirmButtonText: 'Saya Mengerti',
                                confirmButtonColor: '#ef4444', // Warna merah pro
                                allowOutsideClick: false // Siswa tidak bisa menutup pesan dengan klik sembarang tempat
                            });
                        } else {
                            // Cadangan jika SweetAlert gagal dimuat, tampilkan teks biasa selama 10 detik
                            showError('Akun Anda sedang aktif di perangkat lain! Silahkan logout dari perangkat sebelumnya atau hubungi guru.', 10000);
                        }
                        return;
                    }

                    // Jika lolos cek, ubah status is_login menjadi true di database Supabase
                    if (userData.role === 'siswa') {
                        const { error: updateError } = await dbClient
                            .from('users')
                            .update({ is_login: true })

                        if (updateError) {

                        }
                    }

                    user = userData;

                } catch (error) {
                    if (typeof Swal !== 'undefined') Swal.close();

            async function prosesMulaiUjianSiswa(user, subject) {
                if (typeof showLoading === 'function') showLoading();
                
                // Set mapel yang dipilih
                currentExam = { subject: subject };
                sessionStorage.setItem('currentExam', JSON.stringify(currentExam));
                localStorage.setItem('currentExam', JSON.stringify(currentExam));

                // Lakukan proses muat Bank Soal & Nilai hanya setelah siswa yakin masuk ke ujian
                const examDataLoaded = await loadExamData();
                
                // Cek limit kesempatan (1 kali)
                if (examSettings.limit_one_attempt) {
                    // Asumsi allExamResults telah dimuat melalui loadExamData() di aplikasi Anda
                    const hasTakenExam = allExamResults.some(result => 
                        result.student_name === (user.name || user.username) && 
                        result.exam_subject === subject
                    );

                    if (hasTakenExam) {
                        if (typeof hideLoading === 'function') hideLoading();
                        if (typeof Swal !== 'undefined') {
                            await Swal.fire({
                                icon: 'warning',
                                title: 'Akses Ditolak',
                                text: 'Anda sudah mengerjakan ujian ini. Kesempatan hanya 1 kali.',
                                confirmButtonColor: '#d33',
                                confirmButtonText: 'Kembali',
                                allowOutsideClick: false
                            });
                        } else {
                            alert("Anda sudah mengerjakan ujian ini!");
                        }
                        //membersihkan saat siswa sudah mengerjakan 1x
                        localStorage.removeItem('currentUser');
                        sessionStorage.removeItem('currentUser');
                        localStorage.removeItem('studentAnswers');
                        if (typeof logout === 'function') logout();
                        return;
                    }
                }

                if (!examDataLoaded) {
                    if (typeof hideLoading === 'function') hideLoading();
                    showError('Gagal memuat data soal dari server. Coba lagi.');
                    return;
                }
                // ✅ RESET STATUS UJIAN (Agar di Admin terbaca "Mengerjakan")
                hasSubmitted = false;
                examSubmitted = false;
                localStorage.removeItem('hasSubmitted'); 

                // ✅ PERTAHANKAN JAWABAN (Agar bisa lanjut jika ke-refresh)
                const savedAnswers = localStorage.getItem('studentAnswers');
                if (savedAnswers) {
                    // Jika ada jawaban tersimpan di memori HP/Komputer, muat kembali!
                    window.studentAnswers = JSON.parse(savedAnswers);
                    console.log("Memulihkan jawaban sebelumnya...");
                } else {
                    // Jika benar-benar baru pertama kali mulai, baru dikosongkan
                    window.studentAnswers = {}; 
                }

                // Filter soal yang sesuai dengan jenjang kelas dan mapel
                const gradeLevel = user.class.charAt(0); 
                const availableQuestions = allQuestions.filter(q => 
                    q.question_class === gradeLevel && 
                    q.subject === subject
                );
                if (availableQuestions.length === 0) {
                    if (typeof hideLoading === 'function') hideLoading();
                    if (typeof renderNoQuestionsPage === 'function') renderNoQuestionsPage();
                    return;
                }
                // Eksekusi Soal
                await loadExamQuestions();

                if (typeof hideLoading === 'function') hideLoading();
                if (typeof activateFullscreen === 'function') activateFullscreen();
                if (typeof mulaiPelaporanSiswa === "function") mulaiPelaporanSiswa();
                if (typeof requestWakeLock === 'function') requestWakeLock();
                if (typeof renderExamPage === 'function') renderExamPage();
            }

            function showError(message) {
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = message;
                errorDiv.classList.remove('hidden');
                setTimeout(() => errorDiv.classList.add('hidden'), 3000);
            }

            // EXAM FUNCTIONS
            async function loadExamQuestions() {
                const gradeLevel = currentUser.class.charAt(0);
                
                let questions = allQuestions.filter(q => 
                    q.question_class === gradeLevel && 
                    q.subject === currentExam.subject
                );
                if (examSettings.shuffle_questions) {
                    questions = shuffleArray(questions);
                }
                
                // Batasi jumlah soal jika max_questions > 0
                if (examSettings.max_questions > 0 && questions.length > examSettings.max_questions) {
                    questions = questions.slice(0, examSettings.max_questions);
                }
                
                examQuestions = questions.map(q => {
                    let options = [];
                    try {
                        options = JSON.parse(q.options || '[]');
                    } catch {
                        options = [];
                    }
                    
                    if (examSettings.shuffle_answers && q.question_type === 'pilihan_ganda') {
                        options = shuffleArray(options);
                    }
                    
                    return { ...q, options };
                });
                
                if (!remainingTime) {
                    remainingTime = examSettings.exam_duration * 60;
                }
            }

            function shuffleArray(array) {
                const newArray = [...array];
                for (let i = newArray.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
                }
                return newArray;
            }

                                Kertas Buram
                            </span>
                        </button>

                        <div id="coretanModal" class="hidden fixed inset-0 z-[70] bg-black/70 flex items-center justify-center backdrop-blur-sm p-2 md:p-4 transition-opacity">
                            <div class="bg-white w-full max-w-4xl h-[90vh] md:h-[85vh] rounded-xl shadow-2xl flex flex-col overflow-hidden border-4 border-gray-300 relative">
                                
                                <div class="bg-gray-100 p-2 md:p-3 border-b border-gray-300 flex justify-between items-center gap-2 flex-wrap">
                                    <h3 class="font-bold text-gray-700 text-sm md:text-base flex items-center gap-2">📝 Kertas Buram</h3>
                                    <div class="flex gap-1.5 md:gap-2">
                                        <button onclick="setPen()" id="btnPen" class="bg-blue-500 text-white px-2 py-1 md:px-3 rounded shadow-sm text-xs md:text-sm border-2 border-blue-700">✏️ Pena</button>
                                        <button onclick="setEraser()" id="btnEraser" class="bg-white text-gray-700 px-2 py-1 md:px-3 rounded shadow-sm text-xs md:text-sm border-2 border-transparent hover:bg-gray-200">🧽 Hapus</button>
                                        <button onclick="clearCanvas()" class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 md:px-3 rounded shadow-sm text-xs md:text-sm">🗑️ Bersih</button>
                                        <div class="w-px h-6 bg-gray-300 mx-1"></div>
                                        <button onclick="toggleCoretan()" class="bg-gray-800 hover:bg-gray-900 text-white px-2 py-1 md:px-3 rounded shadow-sm text-xs md:text-sm font-bold">❌ Tutup</button>
                                    </div>
                                </div>

                                <div class="flex-grow relative cursor-crosshair bg-[url('https://www.transparenttextures.com/patterns/graphy.png')] bg-white" style="touch-action: none;">
                                    <canvas id="coretanCanvas" class="absolute top-0 left-0 w-full h-full block"></canvas>
                                </div>
                            </div>
                        </div>
                        </div>
                `;
                
                startTimer();
                renderQuestion();
                renderQuestionNav();
                renderNavigationButtons();
                setupViolationDetection();
                
                // --- TAMBAHAN: INISIALISASI CANVAS SETELAH HTML DIGAMBAR ---
                // Gunakan setTimeout kecil untuk memastikan elemen HTML benar-benar sudah ada di DOM
                setTimeout(() => {
                    initCanvas();
                }, 100);
            }

            // ==========================================
            // FITUR KERTAS BURAM / CORETAN DIGITAL
            // ==========================================

            let canvas, ctx, coretanModal;
            let isDrawing = false;
            let isEraser = false;

            // Dipanggil setelah renderExamPage selesai
            function initCanvas() {
                canvas = document.getElementById('coretanCanvas');
                coretanModal = document.getElementById('coretanModal');
                
                if (!canvas) return; // Mencegah error jika elemen tidak ditemukan
                
                ctx = canvas.getContext('2d');

                // Mendaftarkan Event Listener untuk Mouse & Touch
                canvas.addEventListener('mousedown', startPosition);
                canvas.addEventListener('mouseup', endPosition);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseleave', endPosition);

                canvas.addEventListener('touchstart', startPosition, { passive: false });
                canvas.addEventListener('touchend', endPosition);
                canvas.addEventListener('touchmove', draw, { passive: false });
                
                window.addEventListener('resize', resizeCanvas);
            }

            // Buka/Tutup Layar Buram
            function toggleCoretan() {
                if (!coretanModal) return;
                
                if (coretanModal.classList.contains('hidden')) {
                    coretanModal.classList.remove('hidden');
                    // Delay sangat kecil agar CSS merender elemen box-nya terlebih dahulu sebelum canvas di-resize
                    setTimeout(resizeCanvas, 50); 
                } else {
                    coretanModal.classList.add('hidden');
                }
            }

            // Sesuaikan Resolusi Gambar agar tidak pecah/blur
            function resizeCanvas() {
                if (!canvas) return;
                const parent = canvas.parentElement;
                
                // --- TAMBAHAN KUNCI PENGAMAN DI SINI ---
                // Jika canvas aslinya ukurannya masih 0, langsung ubah ukurannya tanpa menyimpan (mencegah error)
                if (canvas.width === 0 || canvas.height === 0) {
                    canvas.width = parent.clientWidth > 0 ? parent.clientWidth : 300; // Beri nilai default jika parent juga 0
                    canvas.height = parent.clientHeight > 0 ? parent.clientHeight : 150;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    return; // Hentikan fungsi sampai di sini agar tidak memicu error drawImage
                }
                // ----------------------------------------
                
                // Simpan gambar sementara sebelum di-resize agar coretan lama tidak hilang
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                tempCtx.drawImage(canvas, 0, 0);

                // Atur ulang ukuran
                canvas.width = parent.clientWidth;
                canvas.height = parent.clientHeight;
                
                // Kembalikan gambar lama (dengan pengaman tambahan)
                if (tempCanvas.width > 0 && tempCanvas.height > 0) {
                    ctx.drawImage(tempCanvas, 0, 0);
                }

                // Setel ulang ketebalan pena
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
            }

            function setPen() {
                isEraser = false;
                document.getElementById('btnPen').classList.add('border-blue-700', 'bg-blue-500', 'text-white');
                document.getElementById('btnPen').classList.remove('bg-white', 'text-gray-700', 'border-transparent');
                
                document.getElementById('btnEraser').classList.remove('border-gray-700', 'bg-gray-300');
                document.getElementById('btnEraser').classList.add('bg-white', 'text-gray-700', 'border-transparent');
            }

            function setEraser() {
                isEraser = true;
                document.getElementById('btnEraser').classList.add('border-gray-700', 'bg-gray-300');
                document.getElementById('btnEraser').classList.remove('bg-white', 'text-gray-700', 'border-transparent');
                
                document.getElementById('btnPen').classList.remove('border-blue-700', 'bg-blue-500', 'text-white');
                document.getElementById('btnPen').classList.add('bg-white', 'text-gray-700', 'border-transparent');
            }

            function clearCanvas() {
                if (typeof Swal !== 'undefined') {
                    Swal.fire({
                        title: 'Bersihkan Kertas?',
                        text: "Semua coretan di kertas buram ini akan dihapus.",
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#ef4444',
                        cancelButtonColor: '#4b5563',
                        confirmButtonText: '🗑️ Ya, Bersihkan',
                        cancelButtonText: 'Batal',
                        allowOutsideClick: false
                    }).then((result) => {
                        if (result.isConfirmed) {
                            // Proteksi aman: Cek apakah elemen canvas sudah ada di layar
                            if (typeof ctx !== 'undefined' && typeof canvas !== 'undefined' && canvas) {
                                ctx.clearRect(0, 0, canvas.width, canvas.height);
                            }
                        }
                    });
                } else {
                    if (typeof ctx !== 'undefined' && typeof canvas !== 'undefined' && canvas) {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                }
            }

            // Dapatkan posisi ujung jari / mouse
            function getPosition(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            function startPosition(e) {
                // Hanya cegah default pada touch event agar tombol di luar canvas masih bisa diklik
                if (e.type === 'touchstart') e.preventDefault(); 
                isDrawing = true;
                draw(e);
            }

            function endPosition() {
                isDrawing = false;
                ctx.beginPath();
            }

            function draw(e) {
                if (!isDrawing) return;
                if (e.type === 'touchmove') e.preventDefault(); // Cegah scroll layar HP saat menggambar

                const pos = getPosition(e);

                ctx.lineWidth = isEraser ? 25 : 3; // Penghapus lebih tebal dari pena
                ctx.globalCompositeOperation = isEraser ? "destination-out" : "source-over";
                ctx.strokeStyle = "#000000";

                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            }

            function updateConnectionStatus() {
                const statusDiv = document.getElementById('connection-status');
                const statusText = document.getElementById('status-text');

                // 1. PENGAMAN (PENTING!): Cek apakah elemen ada?
                // Jika tidak ada (misal di halaman login), stop fungsi agar tidak error.
                if (!statusDiv || !statusText) {
                    return;
                }

                if (navigator.onLine) {
                    // --- JIKA KEMBALI ONLINE ---
                    
                    // 2. Pastikan notifikasi MUNCUL dulu (Hapus 'hidden')
                    statusDiv.classList.remove('hidden');
                    
                    // Atur warna Hijau
                    statusDiv.classList.remove('bg-red-500');
                    statusDiv.classList.add('bg-green-500', 'text-white');
                    statusText.innerText = "🌐 Akhirnya online lagi 🤗";

                    // 3. Sembunyikan pesan setelah 3 detik
                    // (Disimpan ke variabel agar tidak bentrok jika internet putus nyambung cepat)
                    clearTimeout(window.connectionTimeout); 
                    window.connectionTimeout = setTimeout(() => {
                        statusDiv.classList.add('hidden');
                    }, 3000);

                } else {
                    // --- JIKA OFFLINE ---
                    
                    // Batalkan timer sembunyi (agar pesan offline tidak hilang tiba-tiba)
                    if (window.connectionTimeout) clearTimeout(window.connectionTimeout);

                    // Pastikan notifikasi MUNCUL
                    statusDiv.classList.remove('hidden');
                    
                    // Atur warna Merah
                    statusDiv.classList.remove('bg-green-500');
                    statusDiv.classList.add('bg-red-500', 'text-white');
                    statusText.innerText = "🚫 Koneksi Terputus! Jangan Refresh Halaman🥹";
                }
            }

            // Pastikan Event Listener dipasang
            window.addEventListener('online', updateConnectionStatus);
            window.addEventListener('offline', updateConnectionStatus);

            // Cek status saat pertama kali halaman dimuat
            document.addEventListener('DOMContentLoaded', updateConnectionStatus);
            
            // 1. Pisahkan logika visibility change ke fungsi tersendiri
            function handleVisibilityViolation() {
                if (currentUser?.role === 'siswa' && currentExam && !examSubmitted) {
                    if (document.hidden && !isRefreshing) {
                        violationCount++;
                        localStorage.setItem('violationCount', violationCount.toString());
                        updateViolationDisplay();
                        showViolationWarning();
                    }
                }
            }

            // 2. Pisahkan logika klik kanan ke fungsi tersendiri
            function handleContextMenuViolation(e) {
                if (currentUser && currentUser.role === 'siswa' && currentExam && !examSubmitted) {
                    e.preventDefault();
                    showToast('Klik kanan tidak diperbolehkan selama ujian', 'error');
                }
            }

            // 3. Fungsi utamanya menjadi jauh lebih pendek dan aman
            function setupViolationDetection() {
                // Hapus listener lama untuk mencegah penumpukan (Event Leak)
                document.removeEventListener('visibilitychange', handleVisibilityViolation);
                document.removeEventListener('contextmenu', handleContextMenuViolation);
                
                // Pasang listener yang baru
                document.addEventListener('visibilitychange', handleVisibilityViolation);
                document.addEventListener('contextmenu', handleContextMenuViolation);
            }
            
            function updateViolationDisplay() {
                const violationElement = document.getElementById('violationCount');
                if (violationElement) {
                    violationElement.textContent = violationCount;
                    
                    // Update background color and icon
                    const violationContainer = violationElement.closest('div');
                    if (violationContainer) {
                        violationContainer.style.backgroundColor = violationCount > 0 ? '#fee2e2' : '#dcfce7';
                        violationElement.parentElement.style.color = violationCount > 0 ? '#dc2626' : '#16a34a';
                        
                        // Update icon
                        const iconSpan = violationContainer.querySelector('span:first-child');
                        if (iconSpan) {
                            iconSpan.textContent = violationCount > 0 ? '🚨' : '✅';
                        }
                    }
                }
            }
            
            function showViolationWarning() {
                const warningDiv = document.createElement('div');
                warningDiv.className = 'fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50';
                warningDiv.innerHTML = `
                    <div class="bg-white rounded-2xl p-8 max-w-md mx-4 text-center shadow-2xl">
                        <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-red-100 flex items-center justify-center">
                            <span class="text-5xl">⚠️</span>
                        </div>
                        <h2 class="text-2xl font-bold text-red-600 mb-3">PERINGATAN!</h2>
                        <p class="text-gray-700 mb-4">Anda terdeteksi keluar dari halaman ujian atau membuka tab/aplikasi lain.</p>
                        <div class="bg-red-50 rounded-lg p-4 mb-4">
                            <p class="text-red-800 font-semibold">Jumlah Pelanggaran: ${violationCount}</p>
                        </div>
                        <p class="text-sm text-gray-600 mb-6">Pelanggaran akan tercatat dan dilaporkan ke admin. Tetap fokus pada ujian Anda!</p>
                        <button onclick="this.closest('div.fixed').remove()" 
                            class="px-6 py-3 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700 transition">
                            Saya Mengerti, Lanjutkan Ujian
                        </button>
                    </div>
                `;
                document.body.appendChild(warningDiv);
                
                // Auto close after 10 seconds
                setTimeout(() => {
                    if (warningDiv.parentElement) {
                        warningDiv.remove();
                    }
                }, 10000);
            }

            function renderNavigationButtons() {
                const config = window.elementSdk?.config || defaultConfig;
                const customFont = config.font_family || defaultConfig.font_family;
                const baseFontStack = 'Arial, sans-serif';
                const baseSize = config.font_size || defaultConfig.font_size;
                
                const navContainer = document.getElementById('navigationButtons');
                if (!navContainer) return;
                
                const isLastQuestion = currentQuestionIndex === examQuestions.length - 1;
                
                let buttonsHTML = '';
                
                if (currentQuestionIndex > 0) {
                    buttonsHTML += `
                        <button onclick="previousQuestion()" 
                            class="bg-red-500 hover:bg-red-600 text-white px-4 md:px-6 py-2 md:py-3 text-sm md:text-base rounded-lg font-semibold transition flex-shrink-0"
                            style="font-family: ${customFont}, ${baseFontStack};">
                            ⬅️ Sebelumnya
                        </button>
                    `;
                }
                
                buttonsHTML += `
                    <button onclick="toggleDoubt()" 
                        class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 md:px-6 py-2 md:py-3 text-sm md:text-base rounded-lg font-semibold transition flex-shrink-0"
                        style="font-family: ${customFont}, ${baseFontStack};">
                        ⚠️ Ragu-ragu
                    </button>
                `;
                
                if (isLastQuestion) {
                    buttonsHTML += `
                        <button onclick="submitExam()" 
                            class="bg-green-500 hover:bg-green-600 text-white px-4 md:px-6 py-2 md:py-3 text-sm md:text-base rounded-lg font-bold transition flex-shrink-0"
                            style="font-family: ${customFont}, ${baseFontStack};">
                            ✅ Selesai
                        </button>
                    `;
                } else {
                    buttonsHTML += `
                        <button onclick="nextQuestion()" 
                            class="bg-blue-500 hover:bg-blue-600 text-white px-4 md:px-6 py-2 md:py-3 text-sm md:text-base rounded-lg font-semibold transition flex-shrink-0"
                            style="font-family: ${customFont}, ${baseFontStack};">
                            Berikutnya ➡️
                        </button>
                    `;
                }                
                navContainer.innerHTML = buttonsHTML;
            }

            function renderQuestion() {
                const config = window.elementSdk?.config || defaultConfig;
                const customFont = config.font_family || defaultConfig.font_family;
                const baseFontStack = 'Arial, sans-serif';
                const baseSize = config.font_size || defaultConfig.font_size;
                const textColor = config.text_color || defaultConfig.text_color;
                
                if (!examQuestions || examQuestions.length === 0) {
                    document.getElementById('questionContainer').innerHTML = `
                        <div class="text-center py-12">
                            <p class="text-xl text-gray-600" style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.25}px;">Tidak ada soal tersedia untuk ujian ini.</p>
                        </div>
                    `;
                    return;
                }
                
                const question = examQuestions[currentQuestionIndex];
                const container = document.getElementById('questionContainer');
                
                let questionHTML = `
                    <div class="mb-6">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold" style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.25}px; color: ${textColor};">Soal ${currentQuestionIndex + 1} dari ${examQuestions.length}</h3>
                            <span class="px-4 py-2 bg-blue-100 text-blue-800 rounded-full font-semibold" style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 0.875}px;">
                                ${getQuestionTypeLabel(question.question_type)}
                            </span>
                        </div>
                        <p class="text-lg mb-4 break-words" style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.125}px; color: ${textColor}; word-break: break-word; overflow-wrap: break-word; white-space: pre-wrap;">${question.question_text}</p>
                        ${question.question_image && question.question_image.trim() !== '' ? 
                            `<div class="mb-4">
                                <img src="${question.question_image}" alt="Gambar Soal" class="max-w-full h-auto rounded-lg shadow-lg border-2 border-gray-300" 
                                    onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded" style="display:none; font-family: ${customFont}, ${baseFontStack};">
                                    ⚠️ Gambar gagal dimuat
                                </div>
                            </div>` 
                            : ''
                        }
                    </div>
                `;
                
                if (question.question_type === 'pilihan_ganda') {
                    questionHTML += renderMultipleChoice(question);
                } else if (question.question_type === 'pilihan_ganda_kompleks') {
                    questionHTML += renderComplexMultipleChoice(question);
                } else if (question.question_type === 'isian_singkat') {
                    questionHTML += renderShortAnswer(question);
                } else if (question.question_type === 'benar_salah') {
                    questionHTML += renderTrueFalse(question);
                }
                
                container.innerHTML = questionHTML;
            }

            function getQuestionTypeLabel(type) {
                const labels = {
                    'pilihan_ganda': 'Pilihan Ganda',
                    'pilihan_ganda_kompleks': 'Pilihan Ganda Kompleks',
                    'isian_singkat': 'Isian Singkat',
                    'benar_salah': 'Benar/Salah'
                };
                return labels[type] || type;
            }

            function renderMultipleChoice(question) {
                const config = window.elementSdk?.config || defaultConfig;
                const customFont = config.font_family || defaultConfig.font_family;
                const baseFontStack = 'Arial, sans-serif';
                const baseSize = config.font_size || defaultConfig.font_size;
                const textColor = config.text_color || defaultConfig.text_color;
                
                const currentAnswer = studentAnswers[currentQuestionIndex];
                
                return `
                    <div class="space-y-3">
                        ${question.options.map((option, idx) => `
                            <label class="flex items-start p-4 border-2 rounded-lg cursor-pointer hover:bg-blue-50 transition ${currentAnswer === option ? 'border-blue-500 bg-blue-50' : 'border-gray-300'}">
                                <input type="radio" name="answer" value="${option.replace(/"/g, '&quot;')}" 
                                    ${currentAnswer === option ? 'checked' : ''}
                                    onchange="saveAnswer(${idx})"
                                    class="mt-1 w-5 h-5 text-blue-600 flex-shrink-0">
                                
                                <div class="ml-3 flex-1 flex items-start gap-2" style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize}px; color: ${textColor};">
                                    <span class="font-bold flex-shrink-0">${String.fromCharCode(65 + idx)}.</span>
                                    
                                    <div class="quill-content-render break-words w-full" style="word-break: break-word; overflow-wrap: break-word;">
                                        ${option}
                                    </div>
                                </div>
                            </label>
                        `).join('')}
                    </div>
                `;
            }

            function renderComplexMultipleChoice(question) {
                const config = window.elementSdk?.config || defaultConfig;
                const customFont = config.font_family || defaultConfig.font_family;
                const baseFontStack = 'Arial, sans-serif';
                const baseSize = config.font_size || defaultConfig.font_size;
                const textColor = config.text_color || defaultConfig.text_color;
                
                const currentAnswer = studentAnswers[currentQuestionIndex] || "";
                
                let selectedOptions = [];
                if (Array.isArray(currentAnswer)) {
                    selectedOptions = currentAnswer;
                } else if (typeof currentAnswer === 'string' && currentAnswer.trim() !== "") {
                    selectedOptions = currentAnswer.split(',');
                }
                
                return `
                    <div class="space-y-3">
                        <div class="bg-blue-50 border-l-4 border-blue-500 p-3 mb-4 rounded-r-lg">
                            <p class="text-sm font-bold text-blue-800" style="font-family: ${customFont}, ${baseFontStack};">
                                💡 Pilih semua jawaban yang menurut Anda benar.
                            </p>
                        </div>

                        <div class="grid grid-cols-1 gap-3">
                            ${question.options.filter(opt => opt && opt.trim() !== "").map((option, idx) => {
                                const isChecked = selectedOptions.includes(option);
                                return `
                                    <label class="group flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all duration-200 
                                        ${isChecked ? 'border-blue-500 bg-blue-50 shadow-sm' : 'border-gray-200 bg-white hover:border-gray-400'}">
                                        
                                        <div class="flex items-center justify-center flex-shrink-0">
                                            <input type="checkbox" value="${option.replace(/"/g, '&quot;')}" 
                                                ${isChecked ? 'checked' : ''}
                                                onchange="saveComplexAnswer(this)"
                                                class="w-6 h-6 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer">
                                        </div>

                                        <div class="ml-4 flex-grow">
                                            <div class="break-words leading-relaxed" style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize}px; color: ${textColor};">
                                                ${option}
                                            </div>
                                        </div>
                                    </label>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }

            function renderShortAnswer(question) {
                const config = window.elementSdk?.config || defaultConfig;
                const customFont = config.font_family || defaultConfig.font_family;
                const baseFontStack = 'Arial, sans-serif';
                const baseSize = config.font_size || defaultConfig.font_size;
                
                const currentAnswer = studentAnswers[currentQuestionIndex] || '';
                
                return `
                    <div class="mt-4">
                        <label class="block text-blue-700 font-bold mb-3 uppercase tracking-wide" 
                            style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 0.8}px;">
                            ✍️ Tulis Jawaban Singkat:
                        </label>
                        
                        <input type="text" 
                            id="input-isian-${currentQuestionIndex}"
                            oninput="saveAnswer(this.value)" 
                            class="w-full px-5 py-4 border-2 border-gray-300 rounded-xl shadow-sm focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all text-gray-800"
                            style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.1}px;"
                            placeholder="Ketik jawaban di sini..."
                            value="${currentAnswer.replace(/"/g, '&quot;')}"
                            autocomplete="off">
                            
                        <p class="mt-2 text-xs text-gray-400 font-medium">*Jawaban tersimpan otomatis saat Anda mengetik.</p>
                    </div>
                `;
            }

            function renderTrueFalse(question) {
                const config = window.elementSdk?.config || defaultConfig;
                const customFont = config.font_family || defaultConfig.font_family;
                const baseFontStack = 'Arial, sans-serif';
                const baseSize = config.font_size || defaultConfig.font_size;
                const textColor = config.text_color || defaultConfig.text_color;
                
                // Ambil jawaban saat ini dari array studentAnswers
                const currentAnswer = studentAnswers[currentQuestionIndex] || "";
                
                return `
                    <div class="mt-6">
                        <div class="bg-gray-50 border-2 border-gray-200 rounded-2xl p-6 shadow-sm">

            function saveAnswerDirect(value) {
                // 1. Simpan langsung teksnya (Benar/Salah) ke array
                studentAnswers[currentQuestionIndex] = value;

                // 2. Simpan ke storage
                const encodedAnswers = JSON.stringify(studentAnswers);
                sessionStorage.setItem('studentAnswers', encodedAnswers);
                localStorage.setItem('studentAnswers', encodedAnswers);

                // 3. Update navigasi dan tampilan
                renderQuestionNav();
                renderQuestion(); 
            }

            function saveAnswer(indexOrText) {
                const currentQuestion = examQuestions[currentQuestionIndex];
                let finalAnswer;

                // 1. Logika Penentuan Jawaban
                if (currentQuestion.question_type === 'isian_singkat' || currentQuestion.question_type === 'benar_salah') {
                    // Ambil nilai teks langsung (Benar/Salah atau hasil ketikan)
                    finalAnswer = indexOrText;
                } else {
                    // Ambil dari array options berdasarkan index (Pilihan Ganda)
                    finalAnswer = currentQuestion.options[indexOrText];
                }

                // 2. Simpan ke array jawaban siswa
                studentAnswers[currentQuestionIndex] = finalAnswer;

                // 3. Simpan ke storage (Local & Session)
                const encodedAnswers = JSON.stringify(studentAnswers);
                sessionStorage.setItem('studentAnswers', encodedAnswers);
                localStorage.setItem('studentAnswers', encodedAnswers);

                // 4. Update warna navigasi nomor soal
                renderQuestionNav();

                // 5. LOGIKA RENDER ULANG (CRITICAL)
                // Kita HANYA memblokir render ulang jika tipenya 'isian_singkat'.
                // Selain itu (pilihan ganda, benar_salah, kompleks), WAJIB render ulang agar UI berubah.
                if (currentQuestion.question_type !== 'isian_singkat') {
                    renderQuestion();
                }
            }

            function saveComplexAnswer(checkbox) {
                const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
                const selected = Array.from(checkboxes).map(cb => cb.value);
                studentAnswers[currentQuestionIndex] = selected;
                sessionStorage.setItem('studentAnswers', JSON.stringify(studentAnswers));
                localStorage.setItem('studentAnswers', JSON.stringify(studentAnswers)); // Tambahkan ini
                renderQuestionNav();
            }

            function saveTrueFalseAnswer(index, value) {
                const currentAnswer = studentAnswers[currentQuestionIndex] || {};
                const answers = typeof currentAnswer === 'string' ? JSON.parse(currentAnswer || '{}') : currentAnswer;
                answers[index] = value;
                studentAnswers[currentQuestionIndex] = answers;
                sessionStorage.setItem('studentAnswers', JSON.stringify(studentAnswers));
                localStorage.setItem('studentAnswers', JSON.stringify(studentAnswers)); // Tambahkan ini
                renderQuestionNav();
            }

            function renderQuestionNav() {
                const nav = document.getElementById('questionNav');
                if (!nav) return;
                
                nav.innerHTML = examQuestions.map((_, idx) => {
                    let className = 'question-nav-btn rounded-lg font-semibold flex items-center justify-center cursor-pointer unanswered';
                    
                    if (studentAnswers[idx] !== undefined && studentAnswers[idx] !== '' && 
                        (!Array.isArray(studentAnswers[idx]) || studentAnswers[idx].length > 0) &&
                        (typeof studentAnswers[idx] !== 'object' || Object.keys(studentAnswers[idx]).length > 0)) {
                        className = className.replace('unanswered', 'answered');
                    }
                    
                    if (doubtQuestions.has(idx)) {
                        className = className.replace('answered', 'doubt').replace('unanswered', 'doubt');
                    }
                    
                    if (idx === currentQuestionIndex) {
                        className += ' current';
                    }
                    
                    return `<div class="${className}" onclick="goToQuestion(${idx})">${idx + 1}</div>`;
                }).join('');
            }

            function goToQuestion(index) {
                currentQuestionIndex = index;
                sessionStorage.setItem('currentQuestionIndex', currentQuestionIndex.toString());
                renderQuestion();
                renderQuestionNav();
                renderNavigationButtons();
            }

            function previousQuestion() {
                if (currentQuestionIndex > 0) {
                    currentQuestionIndex--;
                    sessionStorage.setItem('currentQuestionIndex', currentQuestionIndex.toString());
                    renderQuestion();
                    renderQuestionNav();
                    renderNavigationButtons();
                }
            }

            function nextQuestion() {
                if (currentQuestionIndex < examQuestions.length - 1) {
                    currentQuestionIndex++;
                    sessionStorage.setItem('currentQuestionIndex', currentQuestionIndex.toString());
                    renderQuestion();
                    renderQuestionNav();
                    renderNavigationButtons();
                }
            }

            function toggleDoubt() {
                if (doubtQuestions.has(currentQuestionIndex)) {
                    doubtQuestions.delete(currentQuestionIndex);
                } else {
                    doubtQuestions.add(currentQuestionIndex);
                }
                sessionStorage.setItem('doubtQuestions', JSON.stringify(Array.from(doubtQuestions)));
                renderQuestionNav();
            }

            function startTimer() {
                if (examTimer) clearInterval(examTimer);

                // Kunci unik untuk memori localStorage agar tidak tertukar
                const timerKey = `timer_${currentUser.name}_${currentExam.subject}`;
                
                // 1. Cek apakah sudah ada target waktu selesai di memori (lanjutkan ujian)
                let targetEndTime = localStorage.getItem(timerKey);
                
                // 2. Jika belum ada (ujian baru dimulai), buat target waktu baru
                if (!targetEndTime) {
                    // Durasi ujian diambil dari examSettings (dikalikan 60 ribu untuk jadi milidetik)
                    targetEndTime = Date.now() + (examSettings.exam_duration * 60 * 1000);
                    localStorage.setItem(timerKey, targetEndTime);
                }

                // 3. Jalankan Interval
                examTimer = setInterval(() => {
                    const now = Date.now();
                    const distance = targetEndTime - now; // Hitung sisa waktu aktual

                    if (distance <= 0) {
                        // JIKA WAKTU HABIS
                        clearInterval(examTimer);
                        document.getElementById('timer').innerText = "00:00";
                        
                        // Hapus rekaman memori timer
                        localStorage.removeItem(timerKey); 
                        
                        // Tampilkan pop-up dan kumpulkan jawaban otomatis
                        Swal.fire({
                            icon: 'info',
                            title: 'Waktu Habis!',
                            text: 'Sistem sedang mengirim jawaban Anda ke server...',
                            timer: 2500, /* Pop-up akan otomatis hilang dalam 2.5 detik */
                            timerProgressBar: true,
                            allowOutsideClick: false,
                            showConfirmButton: false,
                            heightAuto: false,
                            //confirmButtonColor: '#3b82f6'
                            didOpen: () => {
                                Swal.showLoading(); // Tampilkan animasi muter-muter
                            }
                        });
                            submitExam(true); // langsung eksekusi kirim
                        
                    } else {
                        // JIKA WAKTU MASIH ADA (Konversi milidetik ke Menit & Detik)
                        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                        // Tambahkan angka 0 di depan jika di bawah 10 (contoh: 09:05)
                        const displayMinutes = minutes < 10 ? "0" + minutes : minutes;
                        const displaySeconds = seconds < 10 ? "0" + seconds : seconds;

                        // Tampilkan ke elemen timer di layar
                        const timerDisplay = document.getElementById('timer');
                        if (timerDisplay) {
                            timerDisplay.innerText = `${displayMinutes}:${displaySeconds}`;
                            
                            // Tambahkan efek kedap-kedip (pulse) jika waktu sisa <= 5 menit
                            if (minutes < 5) {
                                timerDisplay.classList.add('text-red-500', 'animate-pulse');
                            } else {
                                timerDisplay.classList.remove('text-red-500', 'animate-pulse');
                            }
                        }
                    }
                }, 1000);
            }

            async function submitExam(isAutoSubmit = false) {
                if (!navigator.onLine) {
                    alert("Gagal mengirim! Koneksi internet Anda terputus. Silakan cari sinyal dan coba lagi."); 
                    return; 
                }

                // --- MULAI PENGECEKAN WAKTU MINIMAL KUMPUL ---
                const timerKey = `timer_${currentUser.name}_${currentExam.subject}`;
                let distance = 0; 
                let remainingSeconds = 0; 
                
                // Ambil target waktu selesai dari memori browser
                const targetEndTime = localStorage.getItem(timerKey);
                if (targetEndTime) {
                    distance = targetEndTime - Date.now();
                    remainingSeconds = Math.floor(distance / 1000);
                } else if (typeof remainingTime !== 'undefined') {
                    // Fallback jika tidak ada di localStorage tapi ada di variabel global
                    remainingSeconds = remainingTime;
                }
                
                // 1. Ambil batas minimal waktu dari pengaturan (localStorage)
                const minTimeSetting = parseInt(localStorage.getItem('minTimeToSubmit')) || 0;

                // 2. Ambil durasi ujian (Cegah error NaN jika examSettings kosong)
                const durasiUjian = (typeof examSettings !== 'undefined' && examSettings.exam_duration) ? parseInt(examSettings.exam_duration) : 60;
                
                // 3. Hitung waktu yang sudah berjalan
                const totalWaktuUjianDetik = durasiUjian * 60;
                const waktuBerjalanDetik = totalWaktuUjianDetik - remainingSeconds;
                let waktuBerjalanMenit = Math.floor(waktuBerjalanDetik / 60);

                // Cegah angka minus jika terjadi bug pada timer
                if (waktuBerjalanMenit < 0) waktuBerjalanMenit = 0; 

                // 4. KUNCI UTAMA: Blokir jika belum memenuhi syarat!
                if (!isAutoSubmit && minTimeSetting > 0) {
                    if (waktuBerjalanMenit < minTimeSetting || isNaN(waktuBerjalanMenit)) {
                        const menitTampil = isNaN(waktuBerjalanMenit) ? 0 : waktuBerjalanMenit;
                        Swal.fire({
                            title: 'Belum Bisa Dikumpulkan!',
                            text: `Minimal waktu pengerjaan adalah ${minTimeSetting} menit.\nAnda baru mengerjakan selama ${menitTampil} menit.`,
                            icon: 'info',
                            confirmButtonText: 'Kembali Mengerjakan',
                            confirmButtonColor: '#ef4444' // Warna merah Tailwind
                        });
                        
                        return; // Hentikan proses kumpul di sini!
                    }
                }
                // --- AKHIR PENGECEKAN WAKTU MINIMAL KUMPUL ---

                // Konfirmasi dari siswa jika klik kumpul manual
                if (!isAutoSubmit) {
                    if (!confirm('Apakah Anda yakin ingin menyelesaikan ujian sekarang?')) return;
                }
                
                // Matikan interval timer
                if (typeof examTimer !== 'undefined' && examTimer) clearInterval(examTimer);
                
                // Lepaskan Wake Lock (Layar agar bisa mati otomatis lagi)
                if (typeof wakeLock !== 'undefined' && wakeLock !== null) {
                    wakeLock.release().then(() => {
                        wakeLock = null;
                        console.log('Wake Lock dilepas, layar bisa mati otomatis kembali.');
                    }).catch((err) => console.error('Gagal melepas Wake Lock:', err));
                }
                
                // Tampilkan loading
                if (typeof showLoading === 'function') showLoading();
                
                // Tambahkan delay acak agar database tidak overload jika kumpul massal
                if (!isAutoSubmit) {
                    const randomDelay = Math.floor(Math.random() * 12000);
                    await new Promise(resolve => setTimeout(resolve, randomDelay));
                } else {
                    console.log("Emergency/Auto Submit terdeteksi. Mengirim data instan...");
                }
                
                // Tandai ujian telah selesai
                if (typeof examSubmitted !== 'undefined') examSubmitted = true;
                if (typeof hasSubmitted !== 'undefined') hasSubmitted = true;

                // Lapor ke Admin secara realtime
                if (typeof laporKeAdmin === 'function') {
                    await laporKeAdmin(); 
                }

                // Siapkan data untuk dikirim ke database/spreadsheet
                const score = typeof calculateScore === 'function' ? calculateScore() : 0;
                const answersString = typeof studentAnswers !== 'undefined' ? JSON.stringify(studentAnswers) : "{}";
                const waktuLoginSiswa = sessionStorage.getItem('waktuLogin') || "-";
                const waktuSelesaiSiswa = sessionStorage.getItem('waktuSelesai') || new Date().toLocaleTimeString('id-ID');
                
                const examData = {
                    student_name: currentUser.name,
                    student_class: currentUser.class,
                    exam_subject: currentExam.subject,
                    exam_time: new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'}),
                    answers: answersString,
                    final_score: score,
                    violations: typeof violationCount !== 'undefined' ? violationCount : 0,
                    waktu_login: waktuLoginSiswa,
                    waktu_selesai: waktuSelesaiSiswa
                };

                // Bersihkan Memori Timer
                localStorage.removeItem(timerKey); 

                // Bersihkan seluruh history ujian di perangkat (Cegah Curang & Memori Penuh)
                localStorage.removeItem('studentAnswers');
                localStorage.removeItem('currentExam');
                localStorage.removeItem('currentQuestionIndex');
                localStorage.removeItem('remainingTime');
                localStorage.removeItem('violationCount');
                localStorage.removeItem('doubtQuestions');
                
                sessionStorage.removeItem('currentUser');
                sessionStorage.removeItem('currentExam');
                sessionStorage.removeItem('studentAnswers');
                sessionStorage.removeItem('doubtQuestions');
                sessionStorage.removeItem('currentQuestionIndex');
                sessionStorage.removeItem('remainingTime');
                sessionStorage.removeItem('violationCount');
                
                // Proses Simpan ke Database
                let success = false;
                if (typeof saveExamResultToSheet === 'function') {
                    success = await saveExamResultToSheet(examData);
                }
                
                // Tampilkan Hasil jika sukses, tampilkan error jika gagal
                if (success) {
                    if (typeof renderResultPage === 'function') renderResultPage(score);
                } else {
                    console.error("Gagal menyimpan hasil ujian.");
                    if (typeof hideLoading === 'function') hideLoading();
                    alert("Terjadi kesalahan saat menyimpan hasil ujian ke server. Silakan coba klik kumpulkan lagi.");
                }
            }

            // Fungsi pembantu untuk membersihkan HTML dan spasi (Letakkan di luar calculateScore)
            function normalizeText(input) {
                if (!input) return "";
                // Jika input berupa array (untuk PG Kompleks), bersihkan setiap elemennya
                if (Array.isArray(input)) return input.map(i => normalizeText(i)).sort().join(',');
                
                // Jika input berupa string/HTML
                const tempDiv = document.createElement("div");
                tempDiv.innerHTML = input;
                return tempDiv.textContent || tempDiv.innerText || "";
            }

            function calculateScore() {
                let correctAnswers = 0;
                if (!examQuestions || examQuestions.length === 0) return 0;

                examQuestions.forEach((question, idx) => {
                    const rawStudent = studentAnswers[idx];
                    let answerKey;

                    // 1. Dekode dan Parsing Kunci Jawaban
                    try {
                        const decodedKey = atob(question.security_token || "");
                        answerKey = JSON.parse(decodedKey);
                    } catch {
                        answerKey = atob(question.security_token || "");
                    }

                    // 2. Validasi: Jangan hitung jika siswa tidak menjawab
                    if (rawStudent === undefined || rawStudent === null || rawStudent === "" || (Array.isArray(rawStudent) && rawStudent.length === 0)) {
                        return;
                    }

                    // 3. Logika Perbandingan Per Tipe Soal
                    const type = question.question_type;

                    if (type === 'pilihan_ganda' || type === 'benar_salah' || type === 'isian_singkat') {
                        // Bandingkan teks murni, abaikan spasi depan/belakang dan huruf besar/kecil
                        const sAns = normalizeText(rawStudent).trim().toLowerCase();
                        const kAns = normalizeText(answerKey).trim().toLowerCase();
                        
                        if (sAns === kAns) correctAnswers++;
                    } 
                    else if (type === 'pilihan_ganda_kompleks') {
                        // 1. Pastikan jawaban siswa jadi Array, bersihkan HTML, dan urutkan
                        let sArray = Array.isArray(rawStudent) ? rawStudent : [rawStudent];
                        let sNormalized = sArray
                            .map(item => normalizeText(item).trim().toUpperCase())
                            .filter(item => item !== "") // Buang jika ada string kosong
                            .sort();

                        // 2. Pastikan kunci jawaban jadi Array, bersihkan HTML, dan urutkan
                        let kArray = [];
                        if (Array.isArray(answerKey)) {
                            kArray = answerKey;
                        } else {
                            // Jika kunci berupa string "A,C" atau "A, C", pecah jadi array
                            kArray = String(answerKey).split(',');
                        }

                        let kNormalized = kArray
                            .map(item => normalizeText(item).trim().toUpperCase())
                            .filter(item => item !== "")
                            .sort();

                        // 3. Bandingkan isi array yang sudah jadi string murni
                        const sFinal = sNormalized.join(',');
                        const kFinal = kNormalized.join(',');

                        if (sFinal !== "" && sFinal === kFinal) {
                            correctAnswers++;
                        }
                    }
                });

                return Math.round((correctAnswers / examQuestions.length) * 100);
            }

            async function logout() {

                    try {
                        const { error } = await dbClient
                            .from('users')
                            .update({ is_login: false })
                            .eq('username', currentUser.username);
                            
                        if (error) {
                            console.error("Gagal mereset status is_login di Supabase:", error);
                        }
                    } catch (err) {
                        console.error("Koneksi bermasalah saat mereset status login:", err);
                    }
                }
            
                if (examTimer) clearInterval(examTimer);
                if (adminRefreshInterval) clearInterval(adminRefreshInterval);
                examSubmitted = false;
                currentUser = null;
                currentExam = null;
                examQuestions = [];
                studentAnswers = {};
                doubtQuestions = new Set();
                currentQuestionIndex = 0;
                remainingTime = 0;
                violationCount = 0;
                
                localStorage.clear();
                sessionStorage.clear();
                
                renderLoginPage();
            }
            async function resetSiswaLogin(usernameSiswa) {
                // Meminta konfirmasi admin agar tidak salah klik
                if (!confirm(`Yakin ingin mereset sesi login untuk siswa: ${usernameSiswa} ?`)) {
                    return;
                }

                if (typeof showLoading === 'function') showLoading();
                
                try {
                    const { error } = await dbClient
                        .from('users')
                        .update({ is_login: false })
                        .eq('username', usernameSiswa);

                    if (typeof hideLoading === 'function') hideLoading();

                    if (error) {
                        console.error("Error mereset login:", error);
                        if (typeof showError === 'function') {
                            showError("Gagal mereset sesi siswa.");
                        } else {
                            alert("Gagal mereset sesi siswa.");
                        }
                    } else {
                        if (typeof Swal !== 'undefined') {
                            Swal.fire('Berhasil!', `Sesi untuk ${usernameSiswa} telah direset. Siswa bisa login kembali.`, 'success');
                        } else {
                            alert(`Sesi untuk ${usernameSiswa} telah direset.`);
                        }
                        
                        // Segarkan data pengguna secara otomatis
                        refreshTarget('users'); 
                    }
                } catch (err) {
                    if (typeof hideLoading === 'function') hideLoading();
                    console.error("Terjadi kesalahan:", err);
                    alert("Gagal terhubung ke server.");
                }
            }

            function generateClassOptionsForFilter() {
                // 1. Ambil list kelas unik

                return uniqueClasses.map(c => {
                    // --- PEMBERSIHAN DATA ---
                    // Ubah data kelas (c) menjadi String dan buang spasi (trim)
                    const classValue = String(c || "").trim();
                    
                    // Ubah state yang dipilih menjadi String dan buang spasi (trim)
                    const selectedValue = String(filterState.class || "").trim();

                    // --- BANDINGKAN ---
                    // Jika nilainya sama persis, tambahkan atribut 'selected'
                    const isSelected = (classValue === selectedValue) ? 'selected' : '';

                    // Return HTML Option
                    return `<option value="${classValue}" ${isSelected}>${classValue}</option>`;
                }).join('');

            //untuk tambah user
            function generateClassOptions() {
                let options = '';

                    }

            async function addUser(e) {
                e.preventDefault();
                
                const username = document.getElementById('newUsername').value;
                const password = document.getElementById('newPassword').value;
                const name = document.getElementById('newName').value;
                const role = document.getElementById('newRole').value;
                const classValue = role === 'siswa' ? document.getElementById('newClass').value : '';
                const photo = document.getElementById('newPhoto').value;
                
                const userData = {
                    username: username,
                    password: password,
                    name: name,
                    role: role,
                    class: classValue,
                    photo: photo
                };
                
                const success = await saveUserToSheet(userData);
                
                if (success) {
                    hideAddUserForm();
                    showToast('Pengguna berhasil ditambahkan!', 'success');
                    renderUsersSection();

                const user = allUsers.find(u => String(u.id) === String(userId));
