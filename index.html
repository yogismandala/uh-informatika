                // --- AKALIN DISINI: Jika modal sudah ada di layar, hapus dulu yang lama agar tidak dobel ---
                const existingModal = document.getElementById('delete-user-modal');
                if (existingModal) existingModal.remove();

            async function clearAllResults() {
                const yakin = confirm("⚠️ PERINGATAN!\n\nApakah Anda yakin ingin menghapus SEMUA data hasil ujian? Aksi ini tidak dapat dibatalkan!");
                if (!yakin) return;

                try {
                    if (typeof showLoading === 'function') showLoading();

                    // 1. HAPUS DARI SUPABASE (Perintah lebih aman)
                    const { error } = await dbClient
                        .from('examresult') // <--- GANTI INI DENGAN NAMA TABEL ASLI KAMU
                        .delete()
                        .not('id', 'is', null); // <--- Memilih semua baris tanpa terpengaruh tipe data ID

                    if (error) throw error;

                    // 2. KOSONGKAN ARRAY LOKAL (Anti error const)
                    allExamResults.length = 0; 

                    // 3. UPDATE TAMPILAN
                    if (typeof showToast === 'function') {
                        showToast('Semua data hasil ujian berhasil dibersihkan!', 'success');
                    } else {
                        alert('Semua data berhasil dibersihkan!');
                    }
                    
                    renderResultsSection();

                } catch (error) {
                    console.error("Gagal membersihkan data:", error);
                    
                    // Tampilkan pesan error agar kita tahu apa masalah sebenarnya
                    if (typeof showToast === 'function') {
                        showToast('Gagal: ' + error.message, 'error');
                    } else {
                        alert('Gagal membersihkan data: ' + error.message);
                    }
                    
                } finally {
                    if (typeof hideLoading === 'function') hideLoading();
                }
            }

                if (konfirmasi) {

                        .from('monitoring') // WAJIB GANTI: sesuaikan dengan nama tabel Anda

                        alert("Terjadi kesalahan saat menghapus data.");

                }
            }

                    else alert('Tidak ada data untuk didownload');
                    return;
                }
                
                const dataToExport = getProcessedData();
                if (dataToExport.length === 0) {
                    alert("Tidak ada data yang sesuai filter untuk diunduh.");
                    return;
                }

                // 1. Siapkan data
                const formattedData = dataToExport.map((item, index) => {
                    // Ambil waktu dari database, beri nilai "-" jika kosong
                    let jamLogin = item.waktu_login ? item.waktu_login : "-";
                    
                    // Untuk waktu selesai, kita prioritaskan item.waktu_selesai. 
                    // Jika tidak ada, kita fallback mengambil dari item.exam_time (timestamp submit)
                    let jamSelesai = item.waktu_selesai ? item.waktu_selesai : 
                                    (item.exam_time ? new Date(item.exam_time).toLocaleTimeString('id-ID') : "-");

                    return {
                        "No": index + 1,
                        "Nama Siswa": item.student_name,
                        "Kelas": item.student_class,
                        "Mata Pelajaran": item.exam_subject,
                        "Skor": item.final_score,
                        "Waktu Login": jamLogin,     // <--- KOLOM BARU DITAMBAHKAN
                        "Waktu Selesai": jamSelesai, // <--- KOLOM BARU DITAMBAHKAN
                        "Pelanggaran": item.violations || 0
                    };
                });

                // 3. Buat Nama File Dinamis
                let fileName = "Hasil_Ujian";
                if (filterState.class) fileName += `_Kelas_${filterState.class}`;
                if (filterState.subject) fileName += `_${filterState.subject}`;
                fileName += ".xlsx";

                // 4. Proses Pembuatan File Excel (SheetJS)
                const worksheet = XLSX.utils.json_to_sheet(formattedData);
                const workbook = XLSX.utils.book_new();

                // Mengatur lebar kolom agar rapi (Menambahkan 2 kolom waktu)
                const wscols = [
                    {wch: 5},  // No
                    {wch: 30}, // Nama Siswa
                    {wch: 10}, // Kelas
                    {wch: 20}, // Mata Pelajaran
                    {wch: 10}, // Skor
                    {wch: 15}, // Waktu Login (Baru)
                    {wch: 15}, // Waktu Selesai (Baru)
                    {wch: 15}  // Pelanggaran
                ];
                worksheet['!cols'] = wscols;

                XLSX.utils.book_append_sheet(workbook, worksheet, "Hasil Ujian");
                XLSX.writeFile(workbook, fileName);            
            }

            function showQuestionDetail(q) {
                // 1. AMBIL DAN DECODE KUNCI JAWABAN
                let kunciRaw = '';
                try {
                    kunciRaw = q.security_token ? atob(q.security_token).trim() : String(q.correct_answer || q.answer_key || '').trim();
                } catch (e) { 
                    kunciRaw = String(q.correct_answer || '').trim(); 
                }

                // 2. FUNGSI PEMBERSIH BARU (LEBIH AMAN)
                const cleanText = (str) => {
                    if (str === null || str === undefined) return "";
                    str = String(str);
                    let tmp = document.createElement("DIV");
                    tmp.innerHTML = str;
                    let text = tmp.textContent || tmp.innerText || "";
                    return text.toUpperCase().replace(/\s+/g, ' ').trim();
                };

                const kunciBersihTotal = cleanText(kunciRaw);
                const daftarKunciArray = kunciBersihTotal.split(',').map(k => k.trim());

                // 3. PROSES OPSI JAWABAN
                let optionsArray = [];
                try {
                    if (typeof q.options === 'string' && q.options.trim() !== '') {
                        optionsArray = JSON.parse(q.options);
                    } else if (Array.isArray(q.options)) {
                        optionsArray = q.options;
                    }
                } catch (e) { optionsArray = []; }

                let contentHtml = '';

                // CASE A: JIKA SOAL PILIHAN GANDA / KOMPLEKS
                if (optionsArray && optionsArray.length > 0) {
                    contentHtml += '<div class="space-y-2 mt-3 text-left">';
                    
                    // LOGIKA BARU: Cek apakah ada opsi yang identik 100% dengan kunci jawaban (Mencegah bug 23,5 vs 23)
                    const hasExactTextMatch = optionsArray.some(opt => cleanText(opt) === kunciBersihTotal);

                    optionsArray.forEach((opt, idx) => {
                        const label = String.fromCharCode(65 + idx).toUpperCase(); 
                        const opsiBersih = cleanText(opt);
                        
                        let isCorrect = false;
                        
                        if (opsiBersih !== "") {
                            if (hasExactTextMatch) {
                                // Jika ada match 100%, JANGAN gunakan pecahan koma. Fokus ke Exact Match!
                                if (opsiBersih === kunciBersihTotal) {
                                    isCorrect = true;
                                }
                            } else {
                                // Mode Fleksibel: Digunakan HANYA jika kuncinya format "A, B" atau "1, 2"
                                if (daftarKunciArray.includes(opsiBersih)) {
                                    isCorrect = true;
                                } else if (kunciBersihTotal === label || daftarKunciArray.includes(label)) {
                                    isCorrect = true;
                                } else if (daftarKunciArray.includes(String(idx)) || daftarKunciArray.includes(String(idx + 1))) {
                                    isCorrect = true;
                                }
                            }
                        }

                        contentHtml += `
                            <div class="px-3 py-2 rounded border-2 transition-all ${isCorrect ? 'border-green-500 bg-green-50 shadow-sm' : 'border-gray-200 bg-white'}">
                                <div class="flex items-center gap-3">
                                    <span class="w-7 h-7 flex-shrink-0 flex items-center justify-center rounded-md font-bold text-xs ${isCorrect ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-500'}">
                                        ${label}
                                    </span>
                                    <div class="flex-1 text-sm ${isCorrect ? 'text-green-900 font-bold' : 'text-gray-700'}">
                                        ${opt}
                                    </div>
                                    ${isCorrect ? '<b class="text-green-600 ml-2 text-xl">✓</b>' : ''}
                                </div>
                            </div>`;
                    });
                    contentHtml += '</div>';
                } 
                // CASE B: JIKA SOAL ISIAN SINGKAT
                else {
                    contentHtml = `
                        <div class="mt-4">
                            <div class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Jawaban Benar:</div>
                            <div class="p-4 bg-green-100 border-2 border-green-500 rounded-xl text-green-900 font-bold text-lg text-center shadow-inner">
                                ${kunciRaw}
                            </div>
                        </div>`;
                }

                // 4. TAMPILKAN MODAL
                Swal.fire({
                    title: '<div class="text-lg font-bold text-gray-700">Detail Soal</div>',
                    html: `
                        <div class="text-left">
                            <div class="mb-4 p-3 bg-blue-50 border-l-4 border-blue-500 rounded-r-lg">
                                <div class="text-[10px] font-bold text-blue-400 uppercase mb-1">Pertanyaan:</div>
                                <div class="text-gray-800 text-sm leading-relaxed" style="white-space: pre-wrap;">${q.question_text}</div>
                                ${q.question_image ? `<img src="${q.question_image}" class="mt-3 rounded-lg max-w-full h-auto mx-auto border shadow-sm block">` : ''}
                            </div>                            
                            
                            <div class="flex justify-between items-center mb-1">
                                <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Opsi Jawaban:</div>
                                <div class="text-[9px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold uppercase">Kunci: ${kunciRaw}</div>
                            </div>

                            ${contentHtml}

                            <div class="mt-4 p-2 bg-gray-50 rounded border border-gray-100 text-[10px] text-gray-500 flex justify-between uppercase font-bold tracking-tighter">
                                <span>Kelas: ${q.question_class || '-'}</span>
                                <span>Mapel: ${q.subject || '-'}</span>
                            </div>
                        </div>`,
                    width: '550px',
                    confirmButtonText: 'Tutup',
                    confirmButtonColor: '#2563eb',
                    heightAuto: false
                });
            }

                } catch (e) { decodedKey = rawKey; }

                let parsedOptions = ["", "", "", ""];

                const safeText = q.question_text || "";

                    // 1. Filter awal berdasarkan hak akses (Role Guru vs Admin)
                    let accessibleQuestions = [];
                    if (isAdmin) {
                        accessibleQuestions = allQuestions;
                    } else {
                        accessibleQuestions = allQuestions.filter(q => {
                            const grade = q.question_class ? String(q.question_class).charAt(0) : '';
                            return q.subject === currentUser.subject && currentUser.class && currentUser.class.includes(grade);
                        });
                    }

                    if (!accessibleQuestions || accessibleQuestions.length === 0) {
                        Swal.fire('Info', 'Tidak ada soal yang tersedia untuk didownload.', 'info');
                        return;
                    }

                    // 2. Ekstrak otomatis daftar Mapel/Bab unik yang ada di database soal saat ini
                    const uniqueSubjects = [...new Set(accessibleQuestions.map(q => q.subject).filter(Boolean))];

                    // 3. Tampilkan Dialog Pemilihan Filter sebelum mendownload
                    Swal.fire({
                        title: 'Download Excel (Pilihan Filter)',
                        html: `
                            <div style="text-align: left; font-family: sans-serif;">
                                <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Silakan sesuaikan data bank soal yang ingin Anda ekspor ke Excel di bawah ini:</p>
                                
                                <div style="margin-bottom: 15px;">
                                    <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;">1. Filter Kelas:</label>
                                    <select id="swalFilterClass" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: white;">
                                        <option value="ALL">✨ Semua Tingkat Kelas</option>
                                        <option value="7">Kelas 7</option>
                                        <option value="8">Kelas 8</option>
                                        <option value="9">Kelas 9</option>
                                    </select>
                                </div>
                                
                                <div style="margin-bottom: 10px;">
                                    <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;">2. Filter Mata Pelajaran / Bab:</label>
                                    <select id="swalFilterSubject" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: white;">
                                        <option value="ALL">✨ Semua Mapel / Bab</option>
                                        ${uniqueSubjects.map(sub => `<option value="${sub}">${sub}</option>`).join('')}
                                    </select>
                                </div>
                            </div>
                        `,
                        showCancelButton: true,
                        confirmButtonText: '🚀 Mulai Download',
                        cancelButtonText: 'Batal',
                        confirmButtonColor: '#3085d6',
                        cancelButtonColor: '#d33',
                        preConfirm: () => {
                            return {
                                selectedClass: document.getElementById('swalFilterClass').value,
                                selectedSubject: document.getElementById('swalFilterSubject').value
                            }
                        }
                    }).then((result) => {
                        if (result.isConfirmed) {
                            const { selectedClass, selectedSubject } = result.value;

                            // 4. Lakukan penyaringan akhir berdasarkan input filter user
                            let finalSoal = accessibleQuestions.filter(q => {
                                const grade = q.question_class ? String(q.question_class).charAt(0) : '';
                                
                                const matchClass = (selectedClass === 'ALL' || grade === selectedClass);
                                const matchSubject = (selectedSubject === 'ALL' || q.subject === selectedSubject);
                                
                                return matchClass && matchSubject;
                            });

                            // Jika hasil filter kosong
                            if (finalSoal.length === 0) {
                                Swal.fire('Tidak Ditemukan', 'Tidak ada data soal yang cocok dengan kombinasi filter tersebut.', 'warning');
                                return;
                            }

                            // 5. Format ulang data (dengan proteksi ukuran base64 gambar)
                            const formattedData = finalSoal.map(q => {
                                let answer = '';
                                try {
                                    answer = atob(q.security_token);
                                } catch(e) {
                                    answer = q.answer_key || '';
                                }

                                let opts = q.options;
                                if (typeof opts !== 'string') {
                                    opts = JSON.stringify(opts || []);
                                }
                                
                                let htmlText = q.question_text || '';
                                if (htmlText.length > 32000) {
                                    htmlText = htmlText.replace(/src="data:image\/[^;]+;base64,[^"]+"/g, 'src="[GAMBAR_DIHAPUS_KARENA_UKURAN_TERLALU_BESAR]"');
                                }

                                return {
                                    "question_class": q.question_class || '',
                                    "subject": q.subject || '',
                                    "question_type": q.question_type || 'pilihan_ganda',
                                    "question_text": htmlText,
                                    "question_image": (q.question_image && q.question_image.length > 32000) ? 'URL Gambar Terlalu Panjang' : (q.question_image || ''),
                                    "options": opts,
                                    "answer_key": answer
                                };
                            });

                            // 6. Generate lembar kerja Excel
                            const ws = XLSX.utils.json_to_sheet(formattedData, { 
                                header: ["question_class", "subject", "question_type", "question_text", "question_image", "options", "answer_key"] 
                            });
                            
                            ws['!cols'] = [
                                {wch: 15}, {wch: 18}, {wch: 16}, {wch: 60}, {wch: 25}, {wch: 30}, {wch: 15}
                            ];
                            ws['!autofilter'] = { ref: `A1:G${formattedData.length + 1}` };

                            const wb = XLSX.utils.book_new();
                            XLSX.utils.book_append_sheet(wb, ws, "Backup_Bank_Soal");

                            // Kustomisasi nama file dinamis agar mencerminkan filter yang dipilih
                            const nameClass = selectedClass === 'ALL' ? 'SemuaKelas' : `Kelas_${selectedClass}`;
                            const nameSub = selectedSubject === 'ALL' ? 'SemuaMapel' : selectedSubject.replace(/[^a-zA-Z0-9]/g, '_');
                            
                            XLSX.writeFile(wb, `Backup_Soal_${nameClass}_${nameSub}_${new Date().getTime()}.xlsx`);
                            
                            // Beri tanda sukses
                            Swal.fire({
                                icon: 'success',
                                title: 'Berhasil Didownload',
                                text: `Berhasil mengekspor ${finalSoal.length} soal ke file Excel!`,
                                timer: 2000,
                                showConfirmButton: false
                            });
                        }
                    });
                } catch (error) {
                    console.error("Gagal mendownload excel:", error);
                    Swal.fire('Error', 'Sistem gagal memproses filter download.', 'error');
                }
            }

            // 3. Memancing Input File (Upload Trigger)
            function triggerUploadSoal() {
                const input = document.getElementById('fileUploadSoal');
                if (input) input.click();
            }

            // 4. Proses File Excel yang Diupload ke Database
            function handleUploadSoal(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        
                        const rows = XLSX.utils.sheet_to_json(worksheet);

                        if (rows.length === 0) {
                            Swal.fire('Error', 'File Excel kosong atau format tidak sesuai!', 'error');
                            return;
                        }

                        showLoading();
                        let successCount = 0;
                        let errorCount = 0;

                        for (const row of rows) {
                            let finalOptions = [];
                            
                            // Membaca kolom options tunggal dari excel
                            if (row['options']) {
                                try {
                                    // Jika diisi format JSON valid seperti '["A", "B"]'
                                    finalOptions = JSON.parse(row['options']);
                                } catch (e) {
                                    // Jika guru mengetik manual biasa dipisahkan koma (e.g., "Benar, Salah")
                                    finalOptions = String(row['options']).split(',').map(o => o.trim());
                                }
                            }

                            const payload = {
                                question_class: String(row['question_class'] || ''),
                                subject: row['subject'],
                                question_type: row['question_type'] || 'pilihan_ganda',
                                question_text: row['question_text'],
                                question_image: row['question_image'] || null, // Mendukung upload URL gambar jika ada
                                options: JSON.stringify(finalOptions), 
                                answer_key: String(row['answer_key'] || '').toUpperCase()
                            };

                            // Validasi data baris minimal harus punya mata pelajaran dan teks soal
                            if (payload.subject && payload.question_text) {
                                const { error } = await dbClient.from('questions').insert([payload]);
                                if (error) {
                                    console.error('Gagal simpan baris soal:', error.message);
                                    errorCount++;
                                } else {
                                    successCount++;
                                }
                            } else {
                                errorCount++; 
                            }
                        }

                        hideLoading();
                        Swal.fire(
                            'Upload Selesai', 
                            `Berhasil menambahkan: <b>${successCount} soal</b>.<br>Gagal/Kosong: <b>${errorCount} soal</b>.`, 
                            successCount > 0 ? 'success' : 'error'
                        );
                        
                        event.target.value = ''; // Reset input file
                        
                        if (typeof loadExamData === 'function') {
                            await loadExamData(true); 
                            renderQuestionsSection();
                        }

                    } catch (err) {
                        console.error('Terjadi kesalahan pembacaan excel:', err);
                        hideLoading();
                        Swal.fire('Error', 'Gagal memproses susunan file Excel.', 'error');
                    }
                };
                
                reader.readAsArrayBuffer(file);
            }

            function toggleScheduleFields() {
                const type = document.getElementById('scheduleType').value;
                const scheduledFields = document.getElementById('scheduledFields');
                const manualFields = document.getElementById('manualFields');
                const startInput = document.getElementById('scheduleStart');
                const endInput = document.getElementById('scheduleEnd');
                
                if (type === 'scheduled') {
                    scheduledFields.style.display = 'block';
                    manualFields.style.display = 'none';
                    startInput.required = true;
                    endInput.required = true;
                } else if (type === 'manual') {
                    scheduledFields.style.display = 'none';
                    manualFields.style.display = 'block';
                    startInput.required = false;
                    endInput.required = false;
                } else {
                    scheduledFields.style.display = 'none';
                    manualFields.style.display = 'none';
                    startInput.required = false;
                    endInput.required = false;
                }
            }

            function hideScheduleForm() {
                document.getElementById('scheduleFormContainer').style.display = 'none';
            }

            async function addSchedule(e) {
                e.preventDefault();
                
                const subject = document.getElementById('scheduleSubject').value;
                const type = document.getElementById('scheduleType').value;
                
                // Check if subject already exists
                if (examSettings.active_subjects.some(item => item.subject === subject)) {
                    showToast('Mata pelajaran ini sudah ada dalam jadwal!', 'error');
                    return;
                }
                
                let scheduleItem = {
                    subject: subject
                };
                
                if (type === 'scheduled') {
                    const startTime = document.getElementById('scheduleStart').value;
                    const endTime = document.getElementById('scheduleEnd').value;
                    
                    if (!startTime || !endTime) {
                        showToast('Harap isi waktu mulai dan selesai!', 'error');
                        return;
                    }
                    
                    if (new Date(startTime) >= new Date(endTime)) {
                        showToast('Waktu mulai harus lebih awal dari waktu selesai!', 'error');
                        return;
                    }
                    
                    scheduleItem.start_time = new Date(startTime).toISOString();
                    scheduleItem.end_time = new Date(endTime).toISOString();
                    scheduleItem.is_active = false; // Will be determined by schedule
                } else {
                    const isActive = document.getElementById('scheduleIsActive').checked;
                    scheduleItem.is_active = isActive;
                }
                
                examSettings.active_subjects.push(scheduleItem);            
                
                try {
                    showLoading();
                    // --- DIUBAH: Simpan Jadwal ke Supabase (Kolom jadwal di tabel settings) ---
                    const { error } = await dbClient
                        .from('settings')
                        .update({ jadwal: examSettings.active_subjects })
                        .eq('id', 1);

                    if (error) throw error;
                    
                    hideScheduleForm();
                    showToast('Jadwal ujian berhasil ditambahkan!', 'success');
                    renderScheduleSection();
                } catch (error) {
                    console.error("Gagal simpan jadwal ke Supabase:", error);
                    showToast('Gagal menyimpan jadwal!', 'error');
                    examSettings.active_subjects.pop(); // Batalkan penambahan lokal jika gagal
                } finally {
                    hideLoading();
                }
            }

            async function toggleSubjectActive(subject, newStatus) {
                const index = examSettings.active_subjects.findIndex(item => item.subject === subject);
                
                if (index !== -1) {
                    const oldStatus = examSettings.active_subjects[index].is_active;
                    examSettings.active_subjects[index].is_active = newStatus;
                    
                    try {
                        showLoading();
                        // --- DIUBAH: Update status jadwal ke Supabase ---
                        const { error } = await dbClient
                            .from('settings')
                            .update({ jadwal: examSettings.active_subjects })
                            .eq('id', 1);

                        if (error) throw error;
                        
                        showToast(`${subject} berhasil ${newStatus ? 'diaktifkan' : 'dinonaktifkan'}!`, 'success');
                        renderScheduleSection();
                    } catch (error) {
                        console.error("Gagal ubah status ke Supabase:", error);
                        showToast('Gagal mengubah status jadwal!', 'error');
                        examSettings.active_subjects[index].is_active = oldStatus; // Kembalikan ke asal jika gagal
                    } finally {
                        hideLoading();
                    }
                }
            }

            function deleteSchedule(subject) {
                const confirmDiv = document.createElement('div');
                confirmDiv.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
                confirmDiv.innerHTML = `
                    <div class="bg-white rounded-lg p-6 max-w-sm">
                        <p class="mb-4">Yakin ingin menghapus jadwal untuk ${subject}?</p>
                        <div class="flex gap-3">
                            <button onclick="confirmDeleteSchedule('${subject}'); this.closest('div.fixed').remove();" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">Hapus</button>
                            
                            <button onclick="this.closest('div.fixed').remove()" class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">Batal</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(confirmDiv);
            }

            async function confirmDeleteSchedule(subject) {
                document.querySelector('div.fixed').remove();
                
                const oldActiveSubjects = [...examSettings.active_subjects];
                examSettings.active_subjects = examSettings.active_subjects.filter(item => item.subject !== subject);
                
                try {
                    showLoading();
                    // --- DIUBAH: Update (Hapus mapel) dari Supabase ---
                    const { error } = await dbClient
                        .from('settings')
                        .update({ jadwal: examSettings.active_subjects })
                        .eq('id', 1);

                    if (error) throw error;
                    
                    showToast('Jadwal berhasil dihapus!', 'success');
                    renderScheduleSection();
                } catch (error) {
                    console.error("Gagal hapus jadwal dari Supabase:", error);
                    showToast('Gagal menghapus jadwal!', 'error');
                    examSettings.active_subjects = oldActiveSubjects; // Kembalikan array jika gagal
                } finally {
                    hideLoading();
                }
            }

            // 1. FUNGSI LOAD SETTINGS DARI SUPABASE (SINKRON)
            async function loadSupabaseSettings() {
                try {
                    const { data, error } = await dbClient
                        .from('settings')
                        .select('*')
                        .eq('id', 1)
                        .single();

                    // Jika error karena baris id=1 belum ada, kita biarkan pakai default awal
                    if (error && error.code !== 'PGRST116') { 
                        throw error;
                    }

                    if (data) {
                        // Masukkan data pengaturan umum ke memori lokal
                        examSettings.exam_duration = parseInt(data.exam_duration) || 60;
                        examSettings.max_questions = parseInt(data.max_questions) || 0;
                        examSettings.shuffle_questions = !!data.shuffle_questions;
                        examSettings.shuffle_answers = !!data.shuffle_answers;
                        examSettings.show_score = data.show_score !== false;
                        examSettings.limit_one_attempt = !!data.limit_one_attempt;
                        
                        // --- TAMBAHAN: Ambil batas minimal waktu kumpul dari database ---
                        examSettings.minTimeToSubmit = parseInt(data.min_time_to_submit) || 0;
                        
                        // Ambil data jadwal dari Supabase secara aman
                        let databaseJadwal = data.jadwal;
                        if (typeof databaseJadwal === 'string') {
                            try { 
                                databaseJadwal = JSON.parse(databaseJadwal); 
                            } catch(e) { 
                                console.error("Gagal parse string jadwal:", e);
                                databaseJadwal = []; 
                            }
                        }
                        
                        // PASTIKAN memori lokal diisi data dari database, BUKAN data default aplikasi lagi
                        examSettings.active_subjects = Array.isArray(databaseJadwal) ? databaseJadwal : [];
                    } else {
                        console.warn("Baris data id=1 belum ada di Supabase. Menggunakan nilai default awal.");
                        examSettings.active_subjects = examSettings.active_subjects || [];
                        examSettings.minTimeToSubmit = examSettings.minTimeToSubmit || 0; // Tambahan default
                    }

                    // Simpan juga ke localStorage agar sinkron dengan fungsi validasi submit ujian Anda
                    localStorage.setItem('minTimeToSubmit', (examSettings.minTimeToSubmit || 0).toString());

                    // Jika form pengaturan saat ini sedang terbuka di layar, refresh tampilannya
                    if (document.getElementById('settingsForm')) {
                        renderSettingsSection();
                    }
                    
                    // Jika tabel/halaman jadwal pelajaran sedang terbuka di layar, refresh juga tampilannya
                    if (typeof renderJadwalSection === 'function' && document.getElementById('jadwalTable')) {
                        renderJadwalSection();
                    }

                } catch (e) {
                    console.error("Gagal load settings dari Supabase:", e);
                    showToast('Gagal memuat pengaturan dari database', 'error');
                }
            }

            // 2. FUNGSI SIMPAN SETTINGS KE SUPABASE
            async function saveSettings(e) {
                if (e) e.preventDefault();
                
                const duration = parseInt(document.getElementById('settingDuration').value) || 60;
                const maxQuestions = parseInt(document.getElementById('settingMaxQuestions').value) || 0;
                const shuffle = document.getElementById('settingShuffle').checked;
                const shuffleAnswers = document.getElementById('settingShuffleAnswers').checked;
                const showScore = document.getElementById('settingShowScore').checked;
                const limitOneAttempt = document.getElementById('settingLimitOneAttempt').checked;
                
                // --- TAMBAHAN: Ambil nilai input dari elemen UI baru ---
                const minTimeToSubmit = parseInt(document.getElementById('settingMinTime').value) || 0;
                
                try {
                    showLoading();
                    
                    // Ambil jadwal aktual dari memori lokal (yang sudah di-load dari supabase sebelumnya)
                    const currentJadwal = examSettings.active_subjects || [];

                    const payloadSettings = {
                        id: 1, 
                        exam_duration: duration,
                        max_questions: maxQuestions,
                        shuffle_questions: shuffle,
                        shuffle_answers: shuffleAnswers,
                        limit_one_attempt: limitOneAttempt,
                        show_score: showScore,
                        jadwal: currentJadwal,
                        // --- TAMBAHAN: Kirimkan nilai baru ini ke Supabase ---
                        min_time_to_submit: minTimeToSubmit 
                    };

                    const { error } = await dbClient
                        .from('settings')
                        .upsert(payloadSettings);

                    if (error) throw error;
                    
                    // Update state lokal setelah dipastikan sukses masuk Supabase
                    examSettings.exam_duration = duration;
                    examSettings.max_questions = maxQuestions;
                    examSettings.shuffle_questions = shuffle;
                    examSettings.shuffle_answers = shuffleAnswers;
                    examSettings.show_score = showScore;
                    examSettings.limit_one_attempt = limitOneAttempt;
                    
                    // --- TAMBAHAN: Update memori lokal & localStorage ---
                    examSettings.minTimeToSubmit = minTimeToSubmit;
                    localStorage.setItem('minTimeToSubmit', minTimeToSubmit.toString());
                    
                    showToast('Pengaturan ujian berhasil disimpan ke database!', 'success');
                    
                } catch (error) {
                    console.error("Gagal simpan pengaturan:", error);
                    showToast('Gagal: ' + (error.message || 'Terjadi kesalahan database'), 'error');
                } finally {
                    hideLoading();
                }
            }

            async function refreshTarget(target) {
                try {
                    showLoading(); // Tampilkan overlay loading
                    
                    if (target === 'users') {
                        // 1. AMBIL DATA USERS DARI SUPABASE
                        const { data: usersData, error: usersError } = await dbClient
                            .from('users')
                            .select('*');
                            
                        if (usersError) throw usersError;
                        
                        allUsers = usersData || [];
                        renderUsersSection();
                        showToast('Data Pengguna berhasil diperbarui', 'success');
                        
                    } else if (target === 'examResults') {
                        // 2. AMBIL DATA NILAI DARI SUPABASE
                        const { data: resultsData, error: resultsError } = await dbClient
                            .from('examresult')
                            .select('*')
                            .order('timestamp', { ascending: false });
                            
                        if (resultsError) throw resultsError;
                        
                        const fullResults = resultsData || [];
                        
                        // Filter nilai sesuai dengan role (guru/admin lihat semua, siswa lihat miliknya sendiri)
                        if (currentUser.role === 'admin' || currentUser.role === 'guru') {
                            allExamResults = fullResults;
                        } else {
                            allExamResults = fullResults.filter(r => r.student_name === currentUser.name);
                        }
                        
                        renderResultsSection();
                        showToast('Data Hasil Ujian berhasil diperbarui', 'success');
                        
                    } else if (target === 'questions') {
                        // 3. AMBIL DATA SOAL DARI SUPABASE
                        const { data: questionsData, error: questionsError } = await dbClient
                            .from('questions')
                            .select('*')
                            .order('id', { ascending: true });
                            
                        if (questionsError) throw questionsError;
                        
                        allQuestions = questionsData || [];
                        
                        // --- PERBAIKAN DI SINI ---
                        // Karena fungsi render sudah digabung dan bisa mendeteksi role sendiri,
                        // kita cukup memanggil 1 fungsi ini saja.
                        renderQuestionsSection();
                        // -------------------------
                        
                        showToast('Bank Soal berhasil diperbarui', 'success');
                    }
                    
                } catch (error) {
                    console.error("Error refresh data:", error);
                    showToast('Gagal refresh data. Periksa koneksi Anda.', 'error');
                } finally {
                    hideLoading(); // Sembunyikan loading
                }
            }

            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white font-semibold shadow-lg transition z-50 ${
                    type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'
                }`;
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            // ============================================
            // ELEMENT SDK
            // ============================================
            async function onConfigChange(config) {
                const appElement = document.getElementById('app');
                if (!appElement) return;
                
                if (currentUser && currentUser.role === 'admin') {
                    renderAdminDashboard();
                } else if (currentUser && currentUser.role === 'siswa') {
                    renderExamPage();
                } else {
                    renderLoginPage();
                }
            }

            const capabilities = {
                recolorables: [
                    {
                        get: () => window.elementSdk?.config?.primary_color || defaultConfig.primary_color,
                        set: (value) => {
                            if (window.elementSdk?.config) {
                                window.elementSdk.config.primary_color = value;
                                window.elementSdk.setConfig({ primary_color: value });
                            }
                        }
                    },
                    {
                        get: () => window.elementSdk?.config?.secondary_color || defaultConfig.secondary_color,
                        set: (value) => {
                            if (window.elementSdk?.config) {
                                window.elementSdk.config.secondary_color = value;
                                window.elementSdk.setConfig({ secondary_color: value });
                            }
                        }
                    },
                    {
                        get: () => window.elementSdk?.config?.background_color || defaultConfig.background_color,
                        set: (value) => {
                            if (window.elementSdk?.config) {
                                window.elementSdk.config.background_color = value;
                                window.elementSdk.setConfig({ background_color: value });
                            }
                        }
                    },
                    {
                        get: () => window.elementSdk?.config?.text_color || defaultConfig.text_color,
                        set: (value) => {
                            if (window.elementSdk?.config) {
                                window.elementSdk.config.text_color = value;
                                window.elementSdk.setConfig({ text_color: value });
                            }
                        }
                    },
                    {
                        get: () => window.elementSdk?.config?.button_color || defaultConfig.button_color,
                        set: (value) => {
                            if (window.elementSdk?.config) {
                                window.elementSdk.config.button_color = value;
                                window.elementSdk.setConfig({ button_color: value });
                            }
                        }
                    }
                ],
                borderables: [],
                fontEditable: {
                    get: () => window.elementSdk?.config?.font_family || defaultConfig.font_family,
                    set: (value) => {
                        if (window.elementSdk?.config) {
                            window.elementSdk.config.font_family = value;
                            window.elementSdk.setConfig({ font_family: value });
                        }
                    }
                },
                fontSizeable: {
                    get: () => window.elementSdk?.config?.font_size || defaultConfig.font_size,
                    set: (value) => {
                        if (window.elementSdk?.config) {
                            window.elementSdk.config.font_size = value;
                            window.elementSdk.setConfig({ font_size: value });
                        }
                    }
                }
            };

            function mapToEditPanelValues(config) {
                return new Map([
                    ["app_title", config.app_title || defaultConfig.app_title],
                    ["school_name", config.school_name || defaultConfig.school_name],
                    ["welcome_text", config.welcome_text || defaultConfig.welcome_text],
                    ["login_button_text", config.login_button_text || defaultConfig.login_button_text]
                ]);
            }

            if (window.elementSdk) {
                window.elementSdk.init({
                    defaultConfig,
                    onConfigChange,
                    mapToCapabilities: () => capabilities,
                    mapToEditPanelValues
                });
            }

            init();
        </script>
    </body>
</html>
